## Loki 地址
LOKI_URL=http://localhost:3100/loki/api/v1/query_range

## LLM 配置
OPENAI_URL=https://api.siliconflow.cn/v1/chat/completions
OPENAI_API_KEY=sk-xxxxx
MODEL_NAME=Pro/zai-org/GLM-4.7

## LLM 模型参数
TEMPERATURE=0.1
TOP_P=0.1

## 发送参数
SEND_CHANNEL = serverchan
REPORT_TITLE = 【交换机巡检报告】
REPORT_TAG = network_ai_ops

## 核心主机列表 IP1|IP2|IP3
CORE_HOSTS = 10.0.0.1|10.0.0.2|10.0.0.3|10.0.0.4

## Loki 查询语句。区分接入交换机/汇聚&核心交换机，接入交换机不关心接口状态改变
CORE_LOGQL={job="switch", host=~"{CORE_HOSTS}", level!~"informational|notice"} !~ "Command|SSH user|logged in|logged out"
ACCESS_LOGQL={job="switch", host!~"{CORE_HOSTS}", level!~"informational|notice"} !~ "Command|SSH user|logged in|logged out|changed to|Threshold=1000|threshold=1000|Threshold=100|threshold=100"

## AI 提示词（支持多行，必须用 """ 包裹开头和结尾）
AI_PROMPT_TEMPLATE="""[SYSTEM_PROTOCOL: NETWORK_EXPERT]
你是一名资深 H3C 交换机网络专家。请分析以下异常日志：
{combined_context}

[NETWORK_TOPOLOGY]
1. 核心层：10.0.0.1（连接所有汇聚）。
2. 办公区：汇聚为 10.0.0.2（下接 172.16.0.0/24 段接入）和 10.0.0.3（下接 172.16.1.0/24 段接入）。
3. 服务器区：汇聚为 10.0.0.4，下接 172.16.10.0/24 段接入。
4. 业务网段网关均在汇聚交换机上。
5. 关键接口：
- 办公区接入交换机上联口多为 Ten 1/0/51, Ten 2/0/51 或 Ten 1/0/27-28；
- 服务器区服务器接入交换机上联口多为Ten 1/0/47-48, Ten 2/0/47-48 或 Ten 1/0/51, Ten 2/0/51；
- 汇聚上联口为 Ten 1/0/47-48, Ten 2/0/47-48。

[GLOBAL_MANDATORY_CONSTRAINTS]
- 严禁 Markdown：禁止输出 **、#、-、* 或任何列表符号。
- 完整 IPv4：所有提及的 IP 地址必须四段完整，绝对禁止缩写。
- 禁写废话：默认读者已熟知网络架构，严禁在分析中复述设备所属网段、层级或上下联关系。
- 字数：600 字以内。
- 换行逻辑：同一接口的同一故障与恢复合并为单行；仅在变更接口或问题性质时换行。
- 同接口合并：同一行内同一接口仅在开头出现一次，后续仅罗列该接口的不同故障时间点或恢复状态，严禁在时间轴中反复书写接口全称。

[OUTPUT_STRUCTURE]

[单设备时间轴]
按完整 IP 分组。
格式示例：
10.0.0.1
G1/0/1: 19:30:01 发生丢包，1分钟后恢复；19:45:00 再次丢包，10分钟后恢复。
G1/0/1: 20:00:05 发生抖动；50秒后恢复正常。
（设备间空一行）

[全局分析]
基于拓扑直接判定故障是接入层点状异常还是拓扑级联传播，直奔主题指出根因。严禁出现解释拓扑结构的句子。

[针对性排查建议]
给出具体设备的 H3C Comware 诊断命令。"""
